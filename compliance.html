<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1d4ed8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Compliance — Eccleshall CFR</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <header class="app-header">
    <span class="header-logo"><span class="callsign">RC0681</span> <span>Compliance</span></span>
    <span id="header-user"></span>
    <span id="sync-badge" class="sync-indicator sync-ok"></span>
  </header>

  <main class="main-content">

    <!-- Tabs -->
    <div style="display:flex; gap:6px; margin-bottom:16px; overflow-x:auto; padding-bottom:2px;">
      <button class="btn btn-primary btn-sm tab-btn" data-tab="overview"  onclick="switchTab('overview')">Overview</button>
      <button class="btn btn-ghost btn-sm tab-btn"   data-tab="expiry"    onclick="switchTab('expiry')">Expiry Dates</button>
      <button class="btn btn-ghost btn-sm tab-btn"   data-tab="vdi"       onclick="switchTab('vdi')">VDI History</button>
      <button class="btn btn-ghost btn-sm tab-btn"   data-tab="monthly"   onclick="switchTab('monthly')">Monthly Checks</button>
    </div>

    <!-- Overview tab -->
    <div id="tab-overview">
      <div id="overview-content">
        <div class="loading"><div class="spinner"></div>Loading…</div>
      </div>
    </div>

    <!-- Expiry tab -->
    <div id="tab-expiry" class="hidden">
      <div class="alert alert-info">
        <span class="alert-icon">ℹ</span>
        <span>Expiry dates from the most recent monthly load list check.
          <span class="rag rag-red" style="margin-left:6px;"></span> &lt;1 month &nbsp;
          <span class="rag rag-amber"></span> &lt;3 months &nbsp;
          <span class="rag rag-green"></span> OK
        </span>
      </div>
      <div id="expiry-content">
        <div class="loading"><div class="spinner"></div>Loading…</div>
      </div>
    </div>

    <!-- VDI history tab -->
    <div id="tab-vdi" class="hidden">
      <div class="filter-bar">
        <input id="vdi-from" class="form-input flex-1" type="date" onchange="loadVDI()">
        <input id="vdi-to"   class="form-input flex-1" type="date" onchange="loadVDI()">
      </div>
      <div id="vdi-content">
        <div class="loading"><div class="spinner"></div>Loading…</div>
      </div>
    </div>

    <!-- Monthly checks tab -->
    <div id="tab-monthly" class="hidden">
      <div id="monthly-content">
        <div class="loading"><div class="spinner"></div>Loading…</div>
      </div>
    </div>

  </main>

  <!-- VDI detail modal -->
  <div id="vdi-modal" class="modal-overlay hidden">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <h2 class="modal-title">Inspection Detail</h2>
      <div id="vdi-modal-content"></div>
      <button class="btn btn-ghost btn-block" onclick="document.getElementById('vdi-modal').classList.add('hidden')">Close</button>
    </div>
  </div>

  <nav id="bottom-nav" class="bottom-nav"></nav>

  <script src="/js/app.js"></script>
  <script src="/js/compliance.js"></script>
</body>
</html>

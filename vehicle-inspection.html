<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1d4ed8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Vehicle Daily Inspection — Eccleshall CFR</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <header class="app-header">
    <span class="header-logo">RC0681 <span>Daily Inspection</span></span>
    <span id="header-user"></span>
    <span id="sync-badge" class="sync-indicator sync-ok"></span>
  </header>

  <main class="main-content">
    <div id="success-msg" class="alert alert-success hidden">
      <span class="alert-icon">✓</span>
      <span>Inspection submitted successfully.</span>
    </div>
    <div id="queued-msg" class="alert alert-warning hidden">
      <span class="alert-icon">⏳</span>
      <span>You're offline — inspection saved and will sync automatically.</span>
    </div>

    <!-- Meta -->
    <div class="card">
      <div class="form-row">
        <div class="form-group mb-0">
          <label class="form-label" for="insp-date">Date <span class="req">*</span></label>
          <input id="insp-date" class="form-input" type="date">
        </div>
        <div class="form-group mb-0">
          <label class="form-label" for="insp-mileage">Starting Mileage <span class="req">*</span></label>
          <input id="insp-mileage" class="form-input" type="number" min="0" placeholder="e.g. 12345">
        </div>
      </div>
    </div>

    <!-- Fuel level -->
    <div class="card">
      <p class="card-title">Fuel Level</p>
      <div class="level-wrap">
        <input id="fuel-level" class="level-input" type="range" min="0" max="8" step="1" value="4">
        <div class="level-display">
          <span style="font-size:12px; color:var(--text-muted);">Empty</span>
          <span id="fuel-value" class="level-value level-ok">Half</span>
          <span style="font-size:12px; color:var(--text-muted);">Full</span>
        </div>
        <div class="level-ticks">
          <span>0</span><span>1</span><span>2</span><span>3</span>
          <span>4</span><span>5</span><span>6</span><span>7</span><span>8</span>
        </div>
      </div>
    </div>

    <!-- Oil level -->
    <div class="card">
      <p class="card-title">Oil Level</p>
      <div class="level-wrap">
        <input id="oil-level" class="level-input" type="range" min="0" max="4" step="1" value="2">
        <div class="level-display">
          <span style="font-size:12px; color:var(--text-muted);">Below Min</span>
          <span id="oil-value" class="level-value level-ok">Normal</span>
          <span style="font-size:12px; color:var(--text-muted);">Above Max</span>
        </div>
        <div class="level-ticks">
          <span>Below</span><span>Min</span><span>Normal</span><span>Max</span><span>Over</span>
        </div>
      </div>
    </div>

    <!-- Checklists rendered by JS -->
    <div id="checklist-container"></div>

    <!-- Defects -->
    <div class="card">
      <div class="form-group mb-0">
        <label class="form-label" for="defects-notes">Defects / Missing Equipment</label>
        <textarea id="defects-notes" class="form-textarea" placeholder="Describe any defects or missing items. Must also be reported to the scheme co-ordinator by phone or email." style="min-height:100px;"></textarea>
        <p class="form-hint" id="defects-required-hint" style="color:var(--red); display:none;">
          ⚠ One or more items flagged — please describe the issue above.
        </p>
      </div>
    </div>

    <button id="submit-btn" class="btn btn-primary btn-block btn-lg">Submit Inspection</button>
    <div style="height:8px;"></div>
  </main>

  <nav id="bottom-nav" class="bottom-nav"></nav>

  <script src="/js/app.js"></script>
  <script src="/js/vehicle-inspection.js"></script>
</body>
</html>

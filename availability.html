<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1d4ed8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Rota — Eccleshall CFR</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <header class="app-header">
    <span class="header-logo">RC0681 <span>Rota</span></span>
    <span id="header-user"></span>
    <span id="sync-badge" class="sync-indicator sync-ok"></span>
  </header>

  <main class="main-content">
    <div style="display:flex; gap:6px; margin-bottom:16px;">
      <button class="btn btn-primary btn-sm avail-tab-btn" data-tab="availability"
              onclick="switchAvailTab('availability')">My Availability</button>
      <button class="btn btn-ghost btn-sm avail-tab-btn" data-tab="shifts"
              onclick="switchAvailTab('shifts')">My Shifts</button>
    </div>

    <!-- Availability tab -->
    <div id="avail-tab-availability">
      <div id="avail-blocks-list">
        <div class="loading"><div class="spinner"></div>Loading…</div>
      </div>
    </div>

    <!-- Shifts tab -->
    <div id="avail-tab-shifts" class="hidden">
      <div id="avail-shifts-list">
        <div class="loading"><div class="spinner"></div>Loading…</div>
      </div>
    </div>
  </main>

  <nav id="bottom-nav" class="bottom-nav"></nav>

  <script src="/js/app.js"></script>
  <script src="/js/availability.js"></script>
</body>
</html>

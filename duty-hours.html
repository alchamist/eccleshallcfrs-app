<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1d4ed8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Duty Log — Eccleshall CFR</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <header class="app-header">
    <span class="header-logo">RC0681 <span>Individual Duty Log</span></span>
    <span id="header-user"></span>
    <span id="sync-badge" class="sync-indicator sync-ok"></span>
  </header>

  <main class="main-content">
    <div id="success-msg" class="alert alert-success hidden">
      <span class="alert-icon">✓</span>
      <span>Duty log submitted successfully.</span>
    </div>

    <div id="queued-msg" class="alert alert-warning hidden">
      <span class="alert-icon">⏳</span>
      <span>You're offline — duty log saved and will sync automatically.</span>
    </div>

    <div class="card">
      <p class="card-subtitle">Record your individual on-duty hours for this shift.</p>

      <div class="form-row">
        <div class="form-group mb-0">
          <label class="form-label" for="shift-start-date">Shift Start Date <span class="req">*</span></label>
          <input id="shift-start-date" class="form-input" type="date">
        </div>
        <div class="form-group mb-0">
          <label class="form-label" for="shift-start-time">Start Time <span class="req">*</span></label>
          <input id="shift-start-time" class="form-input" type="time">
        </div>
      </div>

      <div class="form-row" style="margin-top:16px;">
        <div class="form-group mb-0">
          <label class="form-label" for="shift-end-date">Shift End Date <span class="req">*</span></label>
          <input id="shift-end-date" class="form-input" type="date">
        </div>
        <div class="form-group mb-0">
          <label class="form-label" for="shift-end-time">End Time <span class="req">*</span></label>
          <input id="shift-end-time" class="form-input" type="time">
        </div>
      </div>

      <div id="duration-display" class="alert alert-info hidden" style="margin-top:12px; margin-bottom:0;">
        <span class="alert-icon">⏱</span>
        <span id="duration-text"></span>
      </div>
    </div>

    <div class="card">
      <div class="form-row">
        <div class="form-group mb-0">
          <label class="form-label" for="incidents-attended">
            Incidents Attended <span class="req">*</span>
          </label>
          <input id="incidents-attended" class="form-input" type="number" min="0" value="0">
          <p class="form-hint">With patient contact</p>
        </div>
        <div class="form-group mb-0">
          <label class="form-label" for="incidents-allocated">
            Incidents Allocated <span class="req">*</span>
          </label>
          <input id="incidents-allocated" class="form-input" type="number" min="0" value="0">
          <p class="form-hint">Including stood-down</p>
        </div>
      </div>
    </div>

    <button id="submit-btn" class="btn btn-primary btn-block btn-lg">Submit Duty Log</button>
  </main>

  <nav id="bottom-nav" class="bottom-nav"></nav>

  <script src="/js/app.js"></script>
  <script src="/js/duty-hours.js"></script>
</body>
</html>

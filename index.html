<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1d4ed8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Eccleshall CFR</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="/css/app.css">
  <style>
    body { padding: 0; }
  </style>
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">🚑</div>
      <h1>Eccleshall CFR</h1>
      <p>Community First Responders</p>
    </div>

    <div id="error-msg" class="alert alert-danger hidden">
      <span class="alert-icon">⚠</span>
      <span id="error-text">Invalid access key.</span>
    </div>

    <div class="form-group">
      <label class="form-label" for="access-key">Access Key</label>
      <input
        id="access-key"
        class="form-input"
        type="password"
        placeholder="Enter your access key"
        autocomplete="current-password"
        autocapitalize="none"
        spellcheck="false"
      >
    </div>

    <button id="login-btn" class="btn btn-primary btn-block btn-lg">Sign In</button>

    <p class="text-center text-muted text-sm" style="margin-top:20px;">
      Need an access key? Contact your scheme coordinator.
    </p>
  </div>

  <script src="/js/app.js"></script>
  <script>
    // Redirect if already logged in
    if (CFR.isLoggedIn()) location.href = '/dashboard.html';

    const keyInput = document.getElementById('access-key');
    const loginBtn = document.getElementById('login-btn');
    const errorMsg = document.getElementById('error-msg');
    const errorTxt = document.getElementById('error-text');

    function showError(msg) {
      errorTxt.textContent = msg;
      errorMsg.classList.remove('hidden');
    }

    async function doLogin() {
      const key = keyInput.value.trim();
      if (!key) { showError('Please enter your access key.'); return; }

      loginBtn.disabled    = true;
      loginBtn.textContent = 'Signing in…';
      errorMsg.classList.add('hidden');

      try {
        const data = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ access_key: key }),
        });

        if (!data.ok) {
          const err = await data.json().catch(() => ({}));
          showError(err.error || 'Invalid access key. Please try again.');
          return;
        }

        const { user } = await data.json();
        localStorage.setItem('cfr_key',  key);
        localStorage.setItem('cfr_user', JSON.stringify(user));
        location.href = '/dashboard.html';
      } catch {
        showError('Could not connect. Please check your network and try again.');
      } finally {
        loginBtn.disabled    = false;
        loginBtn.textContent = 'Sign In';
      }
    }

    loginBtn.addEventListener('click', doLogin);
    keyInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  </script>
</body>
</html>

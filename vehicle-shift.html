<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1d4ed8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Vehicle Shift — Eccleshall CFR</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <header class="app-header">
    <span class="header-logo">RC0681 <span>Vehicle Shift</span></span>
    <span id="header-user"></span>
    <span id="sync-badge" class="sync-indicator sync-ok"></span>
  </header>

  <main class="main-content">
    <div id="page-content">
      <div class="loading"><div class="spinner"></div>Loading shift status…</div>
    </div>
  </main>

  <!-- Sign-off modal -->
  <div id="signoff-modal" class="modal-overlay hidden">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <h2 class="modal-title">End Shift</h2>

      <div class="form-group">
        <label class="form-label">End Mileage <span class="req">*</span></label>
        <input id="signoff-mileage" class="form-input" type="number" min="0" placeholder="Current odometer reading">
      </div>
      <div class="form-group">
        <label class="form-label">Number of Jobs <span class="req">*</span></label>
        <input id="signoff-jobs" class="form-input" type="number" min="0" value="0">
      </div>
      <div class="form-group">
        <label class="form-label">Comments</label>
        <textarea id="signoff-comments" class="form-textarea" placeholder="Any notes for the coordinator…"></textarea>
      </div>

      <div style="display:flex; gap:10px;">
        <button class="btn btn-ghost flex-1" onclick="closeSignoffModal()">Cancel</button>
        <button class="btn btn-danger flex-1" id="confirm-signoff-btn" onclick="confirmSignoff()">End Shift</button>
      </div>
    </div>
  </div>

  <!-- Start shift modal -->
  <div id="start-modal" class="modal-overlay hidden">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <h2 class="modal-title" id="start-modal-title">Start New Shift</h2>

      <div class="form-group">
        <label class="form-label">Starting Mileage <span class="req">*</span></label>
        <input id="start-mileage" class="form-input" type="number" min="0" placeholder="Current odometer reading">
      </div>

      <div style="display:flex; gap:10px;">
        <button class="btn btn-ghost flex-1" onclick="closeStartModal()">Cancel</button>
        <button class="btn btn-success flex-1" id="confirm-start-btn" onclick="confirmStart()">Start Shift</button>
      </div>
    </div>
  </div>

  <nav id="bottom-nav" class="bottom-nav"></nav>

  <script src="/js/app.js"></script>
  <script src="/js/vehicle-shift.js"></script>
</body>
</html>

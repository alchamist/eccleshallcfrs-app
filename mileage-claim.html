<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1d4ed8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Incident & Mileage — Eccleshall CFR</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <header class="app-header">
    <span class="header-logo"><span class="callsign">RC0681</span> <span>Incident & Mileage</span></span>
    <span id="header-user"></span>
    <span id="sync-badge" class="sync-indicator sync-ok"></span>
  </header>

  <main class="main-content">
    <div id="success-msg" class="alert alert-success hidden">
      <span class="alert-icon">✓</span>
      <span>Claim submitted successfully.</span>
    </div>
    <div id="queued-msg" class="alert alert-warning hidden">
      <span class="alert-icon">⏳</span>
      <span>You're offline — claim saved and will sync automatically.</span>
    </div>

    <div class="card">
      <div class="form-row">
        <div class="form-group mb-0">
          <label class="form-label" for="claim-date">Date <span class="req">*</span></label>
          <input id="claim-date" class="form-input" type="date">
        </div>
        <div class="form-group mb-0">
          <label class="form-label" for="callout-time">Call Out Time <span class="req">*</span></label>
          <input id="callout-time" class="form-input" type="time">
        </div>
      </div>
    </div>

    <div class="card">
      <div class="form-group">
        <label class="form-label" for="job-number">WMAS Job Number</label>
        <input id="job-number" class="form-input" type="text" placeholder="Optional">
      </div>

      <div class="form-group">
        <label class="form-label" for="call-category">Call Category <span class="req">*</span></label>
        <select id="call-category" class="form-select">
          <option value="">Select…</option>
          <option value="cat1">Category 1</option>
          <option value="cat2">Category 2</option>
          <option value="cat3">Category 3</option>
          <option value="cat4">Category 4</option>
          <option value="unknown">Unknown</option>
          <option value="backup">Backup</option>
          <option value="movement">Movement / Travel only</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label" for="patient-age">Patient Age <span class="req">*</span></label>
        <select id="patient-age" class="form-select">
          <option value="">Select…</option>
          <option value="adult">Adult</option>
          <option value="paediatric">Paediatric</option>
          <option value="unknown">Unknown</option>
          <option value="na">Not Applicable</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label" for="incident-type">Incident Type <span class="req">*</span></label>
        <select id="incident-type" class="form-select">
          <option value="">Select…</option>
          <option value="cardiac_arrest">Cardiac Arrest</option>
          <option value="unconscious">Unconscious / Not Responding</option>
          <option value="breathing_difficulty">Breathing Difficulty / Asthma / COPD</option>
          <option value="anaphylaxis">Anaphylaxis</option>
          <option value="rtc">Road Traffic Collision</option>
          <option value="trauma">Trauma</option>
          <option value="chest_pain">Chest Pain</option>
          <option value="fall">Fall</option>
          <option value="stroke">Stroke / TIA / Neurological</option>
          <option value="mental_health">Mental Health</option>
          <option value="concern_welfare">Concern for Welfare</option>
          <option value="sepsis">Sepsis</option>
          <option value="major_incident">Major Incident</option>
          <option value="other">Other</option>
          <option value="na">Not Applicable</option>
        </select>
      </div>

      <div class="form-group mb-0">
        <label class="form-label" for="incident-location">Incident Location</label>
        <input id="incident-location" class="form-input" type="text" placeholder="e.g. Eccleshall, Stone, B5026">
        <p class="form-hint">Town, village or road — used for monthly reporting.</p>
      </div>
    </div>

    <div class="card">
      <div class="form-group">
        <label class="form-label" for="journey-details">Journey Details <span class="req">*</span></label>
        <input id="journey-details" class="form-input" type="text" placeholder='e.g. "Home – Eccleshall – Return"'>
      </div>

      <div class="form-group mb-0">
        <label class="form-label" for="total-miles">Total Miles <span class="req">*</span></label>
        <input id="total-miles" class="form-input" type="number" min="0" step="0.1" placeholder="0">
        <p class="form-hint">Include return trip if applicable. Single direction only if sent to another job.</p>
      </div>
    </div>

    <div class="card">
      <div class="form-group mb-0">
        <label class="form-label" for="claim-comments">Comments</label>
        <textarea id="claim-comments" class="form-textarea" placeholder="Any additional notes…"></textarea>
      </div>
    </div>

    <button id="submit-btn" class="btn btn-primary btn-block btn-lg">Submit Claim</button>
    <div style="height:8px;"></div>
  </main>

  <nav id="bottom-nav" class="bottom-nav"></nav>

  <script src="/js/app.js"></script>
  <script src="/js/mileage-claim.js"></script>
</body>
</html>

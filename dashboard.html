<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1d4ed8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Dashboard — Eccleshall CFR</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <header class="app-header">
    <span class="header-logo">Eccleshall CFR <span>RC0681</span></span>
    <span id="header-user"></span>
    <span id="sync-badge" class="sync-indicator sync-ok"></span>
  </header>

  <main class="main-content">
    <!-- Active shift banner -->
    <div id="active-shift-banner" class="hidden"></div>

    <!-- Stats -->
    <div class="stats-grid" id="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="stat-hours">—</div>
        <div class="stat-label">Hours this month</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-incidents">—</div>
        <div class="stat-label">Incidents this month</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-hours-ytd">—</div>
        <div class="stat-label">Hours YTD</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-incidents-ytd">—</div>
        <div class="stat-label">Incidents YTD</div>
      </div>
    </div>

    <!-- Quick actions -->
    <p class="section-heading">Quick Actions</p>
    <div class="card" style="padding: 12px;">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <a href="/vehicle-shift.html" class="btn btn-primary">🚗 Vehicle Shift</a>
        <a href="/duty-hours.html"    class="btn btn-secondary">⏱ Log Duty</a>
        <a href="/vehicle-inspection.html" class="btn btn-secondary">✔ VDI</a>
        <a href="/mileage-claim.html" class="btn btn-secondary">📄 Claim</a>
      </div>
    </div>

    <!-- Recent activity -->
    <p class="section-heading">Your Recent Activity</p>
    <div class="card" style="padding: 0 16px;">
      <div id="recent-list">
        <div class="loading"><div class="spinner"></div>Loading…</div>
      </div>
    </div>
  </main>

  <nav id="bottom-nav" class="bottom-nav"></nav>

  <script src="/js/app.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
